<!DOCTYPE html>
<html>
    <head>
        <title>Sito web</title>
        <link rel="stylesheet" href="/static/style.css" type="text/css">
        <meta charset="UTF-8">
    </head>
    <body>
        <h1>Gestione Orario</h1>
        
        <div class="container">
            <p id="orario">Clicca il tasto per conoscere l'ora del server</p>
            <button id="btn-ora">Aggiorna Ora</button>
        </div>

        <hr>

        <div class="card">
            <h3>Saluto Personalizzato</h3>
            <input type="text" id="input-nome" placeholder="Scrivi il tuo nome...">
            <button id="btn-saluto">Invia al Server</button>
            <h2 id="risposta-saluto"></h2>
        </div>

        <hr>

        <div class="card">
            <h3>Somma di due numeri</h3>
            <input type="number" id="num1" placeholder="Inserisci il primo numero">
            <input type="number" id="num2" placeholder="Inserisci il secondo numero">
            <button id="btn-somma">Calcola somma</button>
            <h2 id="risultato-somma"></h2>
        </div>

        <hr>

        <div class="card">
        <h3>Calcolatrice</h3>
        <input type="number" id="num1-calc" placeholder="Primo numero">
        <select id="operazione">
            <option value="più">+</option>
            <option value="-">-</option>
            <option value="*">x</option>
            <option value="/">:</option>
        </select>
        <input type="number" id="num2-calc" placeholder="Secondo numero">
        <button id="btn-calcola">Calcola</button>
        <h2 id="risultato"></h2>
    </div>

        <script src="/static/file.js"></script>

    </body>
</html>
